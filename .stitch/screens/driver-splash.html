<style>
        body {

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseBorder {
            0%, 100% { border-color: rgba(3, 29, 52, 0.1); }
            50% { border-color: rgba(3, 29, 52, 0.4); }
        }

        .animate-fade-in { animation: fadeInScale 1s ease-out forwards; }
        .animate-slide-up { animation: slideUp 1s ease-out 0.3s forwards; opacity: 0; }
        .animate-footer { animation: slideUp 0.8s ease-out 0.8s forwards; opacity: 0; }
        
        .driver-card {
            border: 1px solid #e0e1dd;

        .loading-bar {
            height: 3px;
            width: 140px;
            background: #e0e1dd;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .loading-bar::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #031d34;
            animation: loading 2s infinite ease-in-out;
        }

        @keyframes loading {
            0% { left: -100%; }
            50% { left: 0%; }

        }
    </style>

<!-- Micro-interaction script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Subtle hover effect for the central icon
            const logoContainer = document.querySelector('.animate-fade-in');
            logoContainer.addEventListener('mousemove', (e) => {
                const { clientX, clientY } = e;
                const { left, top, width, height } = logoContainer.getBoundingClientRect();
                const x = (clientX - left) / width - 0.5;
                const y = (clientY - top) / height - 0.5;
                
                logoContainer.style.transform = `perspective(1000px) rotateY(${x * 10}deg) rotateX(${-y * 10}deg)`;
            });

            logoContainer.addEventListener('mouseleave', () => {
                logoContainer.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg)';
            });

            // Redirect simulation (Visual only for the prototype)
            console.log('Amana Driver App initialized. Loading assets...');
        });
    </script>
