<style>

<script>
        function selectRide(element) {
            // Remove active class from all
            document.querySelectorAll('.ride-option').forEach(opt => {
                opt.classList.remove('ride-option-active');
            });
            // Add to selected
            element.classList.add('ride-option-active');
        }

        // Simple Bottom Sheet Drag Simulation (Touch events would be needed for real mobile)
        const sheet = document.getElementById('bottomSheet');
        let startY;
        let startHeight;

        sheet.addEventListener('touchstart', (e) => {
            startY = e.touches[0].pageY;
            startHeight = sheet.offsetHeight;
        });

        // Basic visual interaction on button
        const mainBtn = document.querySelector('button.bg-primary');
        mainBtn.addEventListener('click', () => {
            mainBtn.innerHTML = `
                <div class="flex items-center gap-3">
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>جاري البحث عن كابتن...</span>
                </div>
            `;
            setTimeout(() => {
                alert('تم استلام طلبك بنجاح! سيتم إخطارك عند العثور على سائقة.');
                location.reload();
            }, 3000);
        });
    </script>
