</span>

<!-- Bottom Navigation Bar (Hidden on this focused screen per shell filter rule) -->
<!-- The prompt implies a focused task-oriented journey (Active Ride), so we suppress the main global tabs to focus on the map and safety controls -->
<script>
        // Micro-interaction for SOS button
        const sosBtn = document.querySelector('.border-error');
        if (sosBtn) {
            sosBtn.addEventListener('click', () => {
                const confirmed = confirm('هل تريد الاتصال بالطوارئ؟');
                if (confirmed) {
                    console.log('Emergency alerted');
                }
            });
        }

        // Simulate real-time movement (minor map shift)
        let pos = 0;
        const map = document.querySelector('[data-location]');
        if (map) {
            setInterval(() => {
                pos += 0.01;
                map.style.backgroundPosition = `calc(50% + ${Math.sin(pos)}px) calc(50% + ${Math.cos(pos)}px)`;
            }, 50);
        }

        // Status pulsation handling
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Amana Driver Navigation Active');
        });
    </script>
