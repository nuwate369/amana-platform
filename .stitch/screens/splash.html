<style>
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Subtle Geometric Background Pattern */
        .bg-pattern {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(#1a237e 0.5px, transparent 0.5px);
            background-size: 32px 32px;
            opacity: 0.03;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1), rgba(0,0,0,0.4));
        }

        /* Fade-in animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .animate-fade-up {
            animation: fadeInUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .animate-scale-in {
            animation: scaleIn 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        /* Loading indicator shimmer */
        .shimmer {
            position: relative;
            overflow: hidden;
            background-color: #e0e0ff;
        }
        .shimmer::after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            transform: translateX(-100%);
            background-image: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0,
                rgba(255, 255, 255, 0.4) 20%,
                rgba(255, 255, 255, 0.6) 60%,
                rgba(255, 255, 255, 0)
            );
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            100% {
                transform: translateX(100%);
            }
        }
    </style>

<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Subtle parallax effect on mouse move or device tilt
            const pattern = document.querySelector('.bg-pattern');
            
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (event) => {
                    const x = event.beta / 10;
                    const y = event.gamma / 10;
                    pattern.style.transform = `translate(${y}px, ${x}px)`;
                });
            }

            // Redirect simulation (logic for splash screen behavior)
