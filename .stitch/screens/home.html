<!-- Atmospheric Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Simulate subtle map panning or interaction feel
            const mapImage = document.querySelector('main img');
            window.addEventListener('deviceorientation', (event) => {
                const x = event.beta; 
                const y = event.gamma;
                if (x && y) {
                    mapImage.style.transform = `scale(1.1) translate(${y/10}px, ${x/10}px)`;
                }
            });

            // Touch interaction for cards
            const cards = document.querySelectorAll('.glass-card');
            cards.forEach(card => {
                card.addEventListener('touchstart', () => {
                    card.style.transform = 'scale(0.98)';
                });
                card.addEventListener('touchend', () => {
                    card.style.transform = 'scale(1)';
                });
            });
        });
    </script>
