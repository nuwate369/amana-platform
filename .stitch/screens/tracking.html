<script>
        // Simple drag interaction simulator for bottom sheet
        const sheet = document.getElementById('bottomSheet');
        let startY = 0;
        let currentY = 0;

        sheet.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
        });

        sheet.addEventListener('touchmove', (e) => {
            const touchY = e.touches[0].clientY;
            const diff = touchY - startY;
            if (diff > 0) { // Only allow dragging down
                sheet.style.transform = `translateY(${diff}px)`;
            }
        });

        sheet.addEventListener('touchend', (e) => {
            const touchY = e.changedTouches[0].clientY;
            const diff = touchY - startY;
            if (diff > 100) {
                // In a real app, this would snap to a collapsed state
                sheet.style.transform = `translateY(70%)`;
            } else {
                sheet.style.transform = `translateY(0)`;
            }
        });

        // Click interaction for SOS to show visual feedback
        const sosBtn = document.querySelector('.bg-error');
        sosBtn.addEventListener('click', () => {
            const confirm = window.confirm("هل تريد إرسال نداء استغاثة (SOS)؟ سيتم إخطار فريق الأمان وجهات الاتصال الموثوقة فوراً.");
            if (confirm) {
                alert("تم إرسال نداء الاستغاثة. المساعدة في الطريق.");
            }
        });
    </script>
