<!-- Notification Engine Simulator -->
<script>
        const statusToggle = document.getElementById('status-toggle');
        const statusLabel = document.getElementById('status-label');
        const statusIndicator = document.getElementById('status-indicator');
        const requestOverlay = document.getElementById('request-overlay');
        const requestSheet = document.getElementById('request-sheet');
        const acceptBtn = document.getElementById('accept-btn');
        const declineBtn = document.getElementById('decline-btn');

        let isOnline = false;
        let requestTimer;

        statusToggle.addEventListener('click', () => {
            isOnline = !isOnline;
            
            if (isOnline) {
                statusLabel.innerText = "أنت الآن متصل بالخدمة";
                statusIndicator.classList.remove('bg-outline-variant');
                statusIndicator.classList.add('bg-inverse-surface', 'status-pulse');
                statusIndicator.style.color = "#ffffff";
                
                // Simulate a request coming in after 3 seconds
                requestTimer = setTimeout(() => {
                    showRequest();
                }, 3500);
            } else {
                statusLabel.innerText = "أنت الآن غير متصل";
                statusIndicator.classList.add('bg-outline-variant');
                statusIndicator.classList.remove('bg-inverse-surface', 'status-pulse');
                clearTimeout(requestTimer);
                hideRequest();
            }
        });

        function showRequest() {
            requestOverlay.classList.remove('invisible', 'opacity-0');
            requestOverlay.classList.add('opacity-100');
            requestSheet.classList.remove('drawer-down');
            requestSheet.classList.add('drawer-up');
        }

        function hideRequest() {
            requestSheet.classList.remove('drawer-up');
            requestSheet.classList.add('drawer-down');
            setTimeout(() => {
                requestOverlay.classList.add('opacity-0');
                setTimeout(() => {
                    requestOverlay.classList.add('invisible');
                }, 500);
            }, 300);
        }

        acceptBtn.addEventListener('click', () => {
            alert('جاري بدء الرحلة...');
            hideRequest();
        });

        declineBtn.addEventListener('click', () => {
            hideRequest();
            // Queue another request if still online
            if (isOnline) {
                requestTimer = setTimeout(() => {
                    showRequest();
                }, 8000);
            }
        });

        // Micro-interaction for ripples or map movement simulation
        document.addEventListener('mousemove', (e) => {
            if(!isOnline) return;
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            // Subtle shift for dynamic map feel
            document.querySelector('#map-container div').style.transform = `scale(1.1) translate(${x * 10}px, ${y * 10}px)`;
        });
    </script>
