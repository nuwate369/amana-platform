<!-- Micro-interaction for Search Animation -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Subtle random movement for the map to simulate live scanning
            const mapContainer = document.querySelector('[data-location]');
            let xPos = 0;
            let yPos = 0;
            
            function animateMap() {
                xPos = Math.sin(Date.now() / 3000) * 10;
                yPos = Math.cos(Date.now() / 2500) * 10;
                mapContainer.style.transform = `scale(1.1) translate(${xPos}px, ${yPos}px)`;
                requestAnimationFrame(animateMap);
            }
            animateMap();

            // Simulate finding a match after 8 seconds (demo purposes)

        });
    </script>
