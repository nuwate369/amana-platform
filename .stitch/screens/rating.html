  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center">
<!-- Top App Bar (Shared Component) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-14 bg-surface dark:bg-on-surface shadow-sm">
<button class="text-primary dark:text-primary-fixed-dim hover:bg-surface-container-high dark:hover:bg-inverse-surface transition-colors duration-200 ease-in-out p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile text-primary dark:text-primary-fixed-dim">تقييم الرحلة</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow w-full max-w-md pt-20 px-margin-mobile pb-32">
<div class="flex flex-col items-center space-y-lg">
<!-- Driver Profile Section -->
<div class="relative w-full flex flex-col items-center">
<!-- Decorative element -->
<div class="absolute -top-10 w-64 h-64 bg-primary-fixed opacity-10 rounded-full blur-3xl -z-10"></div>
<div class="relative">
<div class="w-24 h-24 rounded-full border-4 border-white shadow-lg overflow-hidden">
<img class="w-full h-full object-cover" data-alt="A professional headshot of a friendly female driver wearing a modern, modest uniform in a soft navy color. She is smiling warmly against a soft-focus background of a clean, premium vehicle interior. The lighting is natural and bright, conveying trust and security, consistent with a high-end Saudi transport service aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCRvRJxmEEQZq3igfoaVS2TOiqOaWoRLZjZklqhWXsF2ypLXBTHp63U90UT3lEn-AiF_1j2Kt5fwu3IVasiE1V17XHDaJVba6yYIUFUza8vpxMeIf-H6ZXGJ3tMaI5WROrJYonuC0WAUjcEswSLlpg2WrNq99JKMbSaXx5GC97QJ7MdcbAV-glQ8Juql7RUCroDMdPTFLR2D2A67VHLlOXKpsLpi4PtC-kUbTmE-HlCWYBLayTW-ivi2TTod-AijSTUDWkmnG4vuCCo"/>
</div>
<div class="absolute bottom-0 right-0 bg-secondary text-white rounded-full p-1 border-2 border-white">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
</div>
<div class="mt-md text-center">
<h2 class="font-headline-md text-headline-md-mobile text-on-surface">سارة الكاظم</h2>
<p class="font-body-md text-on-surface-variant">تويوتا كامري • ٤٨٢٩ ر س أ</p>
</div>
</div>
<!-- Star Rating System -->
<section class="w-full flex flex-col items-center py-md">
<p class="font-label-sm text-on-surface-variant mb-sm">كيف كانت تجربتك مع سارة؟</p>
<div class="flex flex-row-reverse justify-center space-x-2 space-x-reverse" id="rating-container">
<button class="rating-star text-4xl text-outline-variant hover:scale-110 transition-transform" data-value="5">
<span class="material-symbols-outlined text-4xl">star</span>
</button>
<button class="rating-star text-4xl text-outline-variant hover:scale-110 transition-transform" data-value="4">
<span class="material-symbols-outlined text-4xl">star</span>
</button>
<button class="rating-star text-4xl text-outline-variant hover:scale-110 transition-transform" data-value="3">
<span class="material-symbols-outlined text-4xl">star</span>
</button>
<button class="rating-star text-4xl text-outline-variant hover:scale-110 transition-transform" data-value="2">
<span class="material-symbols-outlined text-4xl">star</span>
</button>
<button class="rating-star text-4xl text-outline-variant hover:scale-110 transition-transform" data-value="1">
<span class="material-symbols-outlined text-4xl">star</span>
</button>
</div>
</section>
<!-- Quick Feedback Chips -->
<section class="w-full">
<p class="font-label-sm text-on-surface-variant mb-sm">اختر ما أعجبك:</p>
<div class="flex flex-wrap gap-2">
<button class="feedback-chip px-4 py-2 rounded-full border border-outline-variant text-body-md text-on-surface-variant hover:bg-secondary-container hover:text-on-secondary-container transition-colors">
                        احترافية
                    </button>
<button class="feedback-chip px-4 py-2 rounded-full border border-outline-variant text-body-md text-on-surface-variant hover:bg-secondary-container hover:text-on-secondary-container transition-colors">
                        قيادة آمنة
                    </button>
<button class="feedback-chip px-4 py-2 rounded-full border border-outline-variant text-body-md text-on-surface-variant hover:bg-secondary-container hover:text-on-secondary-container transition-colors">
                        سيارة نظيفة
                    </button>
<button class="feedback-chip px-4 py-2 rounded-full border border-outline-variant text-body-md text-on-surface-variant hover:bg-secondary-container hover:text-on-secondary-container transition-colors">
                        التزام بالموعد
                    </button>
<button class="feedback-chip px-4 py-2 rounded-full border border-outline-variant text-body-md text-on-surface-variant hover:bg-secondary-container hover:text-on-secondary-container transition-colors">
                        خلوقة
                    </button>
</div>
</section>
<!-- Text Area for Comments -->
<section class="w-full">
<label class="block font-label-sm text-on-surface-variant mb-sm" for="feedback-comment">تعليقات إضافية (اختياري):</label>
<textarea class="w-full rounded-xl border-outline-variant bg-surface-container-lowest p-md font-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-all resize-none" id="feedback-comment" placeholder="اكتب ملاحظاتك هنا..." rows="4"></textarea>
</section>
</div>
</main>
<!-- Bottom Action Bar (Fixed) -->
<footer class="fixed bottom-0 left-0 w-full bg-surface-container-lowest px-margin-mobile py-lg safe-bottom shadow-[0_-4px_12px_rgba(26,35,126,0.08)]">
<div class="max-w-md mx-auto">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-headline-md flex items-center justify-center space-x-2 space-x-reverse active:scale-[0.98] transition-transform" id="submit-btn">
<span>إرسال التقييم</span>
<span class="material-symbols-outlined">send</span>
</button>
</div>
</footer>
<script>
        // Star Rating Logic
        const stars = document.querySelectorAll('.rating-star');
        stars.forEach(star => {
            star.addEventListener('click', () => {
                const value = parseInt(star.getAttribute('data-value'));
                stars.forEach(s => {
                    const sValue = parseInt(s.getAttribute('data-value'));
                    const icon = s.querySelector('.material-symbols-outlined');
                    if (sValue <= value) {
                        icon.classList.add('star-active');
                        icon.innerText = 'star';
                    } else {
                        icon.classList.remove('star-active');
                        icon.innerText = 'star';
                    }
                });
            });
        });

        // Quick Feedback Toggle Logic
        const chips = document.querySelectorAll('.feedback-chip');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                chip.classList.toggle('bg-primary');
                chip.classList.toggle('text-white');
                chip.classList.toggle('border-primary');
                chip.classList.toggle('border-outline-variant');
            });
        });

        // Submit Interaction
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.addEventListener('click', () => {
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            setTimeout(() => {
                submitBtn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> <span>شكراً لك!</span>';
                submitBtn.classList.replace('bg-primary', 'bg-green-600');
                
                // Subtle feedback animation
                confettiEffect();
            }, 1000);
        });

        function confettiEffect() {
            // Placeholder for a simple micro-interaction
            console.log("Feedback submitted successfully.");
        }
    </script>
</body></html>
